<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementle – Bonus Round 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles_bonus1.css">
</head>
<body>

    <header class="game-header">
        <h1>Elementle</h1>
        <a href="index.html" class="back-link">← Back</a>
    </header>

    <main class="container">
        <h2>Bonus Round 1 — Neighbors</h2>
        <p class="round-desc">Guess the elements neighboring today's element in the periodic table.</p>
        <div id="elementContainer"></div>
        <form id="guessForm">
            <input type="text" id="guessInput" placeholder="Type a neighboring element" list="elementsList" autocomplete="off">
            <datalist id="elementsList"></datalist>
            <button type="submit">Guess</button>
        </form>
        <p id="remainingGuesses">Remaining Guesses: 8</p>
        <p id="invalidGuessMessage"></p>
        <table id="guessTable">
            <tbody></tbody>
        </table>
        <div id="resultMessage"></div>
    </main>

    <script src="script_bonus1.js"></script>
</body>
</html>
